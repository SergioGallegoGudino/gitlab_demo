# deploy_website.yml
- name: Deploy website via GitLab CI
  hosts: all
  become: yes

  vars:
    base_path: "/srv/nginx/pages"

  tasks:
    - name: Crear directorio destino
      file:
        path: "{{ base_path }}/{{ target_env }}"
        state: directory
        owner: nginx
        group: nginx
        mode: 0755

    - name: Sincronizar archivos del sitio web
      synchronize:
        src: "{{ artifact_path }}/"
        dest: "{{ base_path }}/{{ target_env }}/"
        recursive: yes
        rsync_opts:
          - "--chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r"
      delegate_to: localhost

    - name: Recargar nginx
      service:
        name: nginx
        state: reloaded
